name: Development Build

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # Allows you to manually trigger the build from your browser

jobs:
  build:
    runs-on: macos-14 # Uses macOS with Xcode 15 tools installed

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        submodules: recursive # Automatically pulls in native components/submodules

    - name: Set up Xcode Version
      run: sudo xcode-select -s /Applications/Xcode_15.4.app

    - name: Cache Build Dependencies
      uses: actions/cache@v4
      with:
        path: ~/Library/Developer/Xcode/DerivedData
        key: ${{ runner.os }}-xcode-${{ hashFiles('**/*.xcodeproj') }}

    - name: Build Xcode Project
      run: |
        xcodebuild -project Amethyst.xcodeproj \
                   -scheme PojavLauncher \
                   -configuration Release \
                   -sdk iphoneos \
                   CODE_SIGNING_ALLOWED=NO \
                   CODE_SIGNING_REQUIRED=NO \
                   clean build

    - name: Package App into IPA
      run: |
        mkdir -p Payload
        # Copy the built app bundle into the Payload folder
        cp -r ~/Library/Developer/Xcode/DerivedData/Amethyst-*/Build/Products/Release-iphoneos/PojavLauncher.app Payload/
        # Compress the Payload folder into an installer IPA file
        zip -r Amethyst.ipa Payload

    - name: Upload Finished IPA
      uses: actions/upload-artifact@v4
      with:
        name: Amethyst-iOS-Build
        path: Amethyst.ipa
